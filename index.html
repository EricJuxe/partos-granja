<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partos - Marranas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f7f7fb; }
    .card-soft { border: 0; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,.06); }
    .badge-soft { border-radius: 999px; padding: .45rem .65rem; }
    .sticky-top-soft { position: sticky; top: 0; z-index: 10; background: #f7f7fb; padding-top: .75rem; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>

<body>
  <div class="container py-3">

    <div class="sticky-top-soft">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <div>
          <h5 class="mb-0">🐷 Partos</h5>
          <small class="text-muted">Gestación: 114 días</small>
        </div>
        <button id="btnRefresh" class="btn btn-outline-secondary btn-sm">Actualizar</button>
      </div>

      <div class="d-grid mb-2">
        <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#panelAdd" aria-expanded="false">
          ➕ Agregar marrana
        </button>
      </div>

      <div class="collapse" id="panelAdd">
        <div class="card card-soft mb-3">
          <div class="card-body">
            <h6 class="mb-3">Nueva marrana</h6>
            <form id="formAdd" class="row g-2">
              <div class="col-12">
                <label class="form-label mb-1">Nombre (único)</label>
                <input id="nickname" class="form-control" placeholder="Ej. Chela" required />
              </div>

              <div class="col-12">
                <label class="form-label mb-1">Día de inseminación</label>
                <input id="inseminacion" type="date" class="form-control" required />
              </div>

              <div class="col-12">
                <label class="form-label mb-1">Nota</label>
                <input id="notas" class="form-control" placeholder="Opcional" />
              </div>

              <div class="col-12 d-grid mt-2">
                <button class="btn btn-success">Guardar</button>
              </div>
            </form>

            <small class="text-muted d-block mt-2">
              (Se calcula sola la fecha probable)
            </small>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 align-items-center mb-2">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="showHistorial">
        <label class="form-check-label" for="showHistorial">Ver las que ya parieron</label>
      </div>
      <span id="status" class="text-muted small"></span>
    </div>

    <div id="list" class="d-grid gap-2"></div>

    <!-- Modal para reinseminar -->
    <div class="modal fade" id="modalRe" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="formRe">
            <div class="modal-header">
              <h5 class="modal-title">Re-enseminar</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="re_id" />
              <div class="mb-3">
                <label class="form-label">Nueva fecha</label>
                <input type="date" class="form-control" id="re_fecha" required />
              </div>
              <div class="mb-1">
                <label class="form-label">Nota</label>
                <input type="text" class="form-control" id="re_notas" placeholder="Opcional" />
              </div>
              <small class="text-muted">No crea otra marrana, solo reinicia.</small>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzKa6UML-P3_zq5N5srNXgIbiWU-FAr5iWNsKuX78XCWdIBjNePLVFqpDz4Xrz8jLLy/exec";
    const API_KEY = "ERICO12345";

    const GESTACION_DIAS = 114;
    const AVISO_MOVER_A_PARIDERA_DIAS = 7;

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cbName = "cb_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        const timeout = setTimeout(() => { cleanup(); reject(new Error("Tiempo de espera")); }, 15000);
        function cleanup() { clearTimeout(timeout); delete window[cbName]; script.remove(); }
        window[cbName] = (data) => { cleanup(); resolve(data); };
        const sep = url.includes("?") ? "&" : "?";
        script.src = url + sep + "callback=" + cbName;
        script.onerror = () => { cleanup(); reject(new Error("Error cargando")); };
        document.body.appendChild(script);
      });
    }

    function todayYMD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const da = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${da}`;
    }

    function ymdToDate(ymd) {
      const [y,m,d] = String(ymd).slice(0,10).split("-").map(Number);
      return new Date(y, m-1, d);
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate()+days);
      return d;
    }

    function daysBetween(a, b) {
      return Math.floor((b.getTime() - a.getTime())/(1000*60*60*24));
    }

    //  FECHA BONITA EN ESPAÑOL: "10 de febrero de 2026"
    function formatDateEs(ymd) {
      if (!ymd) return "";
      const d = ymdToDate(ymd);
      return d.toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    }

    function badgeFor(daysToDue) {
      if (daysToDue < 0) return `<span class="badge text-bg-danger badge-soft">ATRASADA</span>`;
      if (daysToDue === 0) return `<span class="badge text-bg-danger badge-soft">HOY</span>`;
      if (daysToDue <= AVISO_MOVER_A_PARIDERA_DIAS) return `<span class="badge text-bg-warning badge-soft text-dark">A paridera</span>`;
      return `<span class="badge text-bg-success badge-soft">En tiempo</span>`;
    }

    function escapeHtml(s){
      return String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function setStatus(msg){
      document.getElementById("status").textContent = msg;
    }

    async function apiList() {
      return await jsonp(`${API_URL}?key=${encodeURIComponent(API_KEY)}&action=list`);
    }

    async function apiAdd(payload) {
      const q = new URLSearchParams({
        key: API_KEY, action:"add",
        nickname: payload.nickname,
        inseminacion: payload.inseminacion,
        notas: payload.notas || ""
      });
      return await jsonp(`${API_URL}?${q.toString()}`);
    }

    async function apiDelete(id) {
      const q = new URLSearchParams({ key: API_KEY, action:"delete", id });
      return await jsonp(`${API_URL}?${q.toString()}`);
    }

    async function apiMarkPario(id, ya_pario=true) {
      const params = { key: API_KEY, action:"mark_pario", id, ya_pario: ya_pario ? "TRUE":"FALSE" };
      if (ya_pario) params.fecha_parto_real = todayYMD();
      const q = new URLSearchParams(params);
      return await jsonp(`${API_URL}?${q.toString()}`);
    }

    async function apiReinseminar(id, inseminacion, notas="") {
      const q = new URLSearchParams({ key: API_KEY, action:"reinseminar", id, inseminacion, notas });
      return await jsonp(`${API_URL}?${q.toString()}`);
    }

    async function loadAndRender() {
      setStatus("Cargando...");
      const resp = await apiList();
      if (!resp.ok) throw new Error(resp.error || "Error");

      const verYaParieron = document.getElementById("showHistorial").checked;
      const today = new Date();

      let rows = (resp.data || []).map(r => {
        const insemiDate = ymdToDate(r.inseminacion);
        const dueDate = addDays(insemiDate, GESTACION_DIAS);
        const daysToDue = daysBetween(today, dueDate);

        const partoReal = r.fecha_parto_real ? ymdToDate(r.fecha_parto_real) : null;
        const diasDesdeParto = partoReal ? daysBetween(partoReal, today) : null;

        return {
          ...r,
          due_ymd: (dueDate.getFullYear()+"-"+String(dueDate.getMonth()+1).padStart(2,"0")+"-"+String(dueDate.getDate()).padStart(2,"0")),
          daysToDue,
          diasDesdeParto
        };
      });

      //  OFF = pendientes, ON = solo ya parieron
      rows = verYaParieron ? rows.filter(r => r.ya_pario) : rows.filter(r => !r.ya_pario);

      // Orden simple:
      if (!verYaParieron) {
        rows.sort((a,b) => a.daysToDue - b.daysToDue); // próximas primero
      } else {
        rows.sort((a,b) => (a.diasDesdeParto ?? 999999) - (b.diasDesdeParto ?? 999999)); // recientes primero
      }

      render(rows, verYaParieron);
      setStatus(`${rows.length} mostradas`);
    }

    function render(rows, verYaParieron) {
      const el = document.getElementById("list");

      if (!rows.length) {
        el.innerHTML = `<div class="alert alert-light card-soft">${verYaParieron ? "No hay marcadas como: ya parió" : "No hay pendientes"}</div>`;
        return;
      }

      el.innerHTML = rows.map(r => {
        const insemiBonita = formatDateEs(r.inseminacion);
        const probableBonita = formatDateEs(r.due_ymd);
        const partoRealBonita = formatDateEs(r.fecha_parto_real);

        // Textos simples:
        const lineaPrincipal = r.ya_pario
          ? `<div class="fw-semibold">Parió el: <span>${escapeHtml(partoRealBonita)}</span></div>`
          : `<div class="fw-semibold">Debe parir: <span>${escapeHtml(probableBonita)}</span></div>`;

        const lineaDias = r.ya_pario
          ? `<div class="small text-muted">Han pasado <b>${r.diasDesdeParto}</b> días</div>`
          : (r.daysToDue < 0
              ? `<div class="small text-muted">Atrasada: <b>${Math.abs(r.daysToDue)}</b> días</div>`
              : (r.daysToDue === 0
                  ? `<div class="small text-muted"><b>Es hoy</b></div>`
                  : `<div class="small text-muted">Faltan <b>${r.daysToDue}</b> días</div>`));

        return `
          <div class="card card-soft">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div class="d-flex align-items-center gap-2">
                    <h6 class="mb-0">${escapeHtml(r.nickname)}</h6>
                    <span class="text-muted small mono">${escapeHtml(r.id)}</span>
                    ${r.ya_pario ? `<span class="badge text-bg-secondary badge-soft">YA PARIÓ</span>` : ``}
                  </div>

                  <div class="small text-muted mt-1">
                    Inseminación: <span>${escapeHtml(insemiBonita)}</span>
                  </div>

                  <div class="mt-2">
                    ${lineaPrincipal}
                    ${lineaDias}
                    ${r.notas ? `<div class="small mt-2">📝 ${escapeHtml(r.notas)}</div>` : ``}
                  </div>
                </div>

                <div class="text-end d-grid gap-2">
                  ${r.ya_pario ? `<span class="badge text-bg-secondary badge-soft">Lista</span>` : badgeFor(r.daysToDue)}

                  ${r.ya_pario ? `
                    <button class="btn btn-primary btn-sm" data-re="${escapeHtml(r.id)}">🔁 Re-enseminar</button>
                  ` : `
                    <button class="btn btn-success btn-sm" data-pario="${escapeHtml(r.id)}">✅ Ya parió</button>
                  `}

                  <button class="btn btn-outline-danger btn-sm" data-del="${escapeHtml(r.id)}">🗑️ Eliminar</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      el.querySelectorAll("button[data-del]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-del");
          if (!confirm("¿Eliminar?")) return;
          setStatus("Eliminando...");
          const resp = await apiDelete(id);
          if (!resp.ok) return alert(resp.error || "Error");
          await loadAndRender();
        });
      });

      el.querySelectorAll("button[data-pario]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-pario");
          if (!confirm("¿Ya parió hoy?")) return;
          setStatus("Guardando...");
          const resp = await apiMarkPario(id, true);
          if (!resp.ok) return alert(resp.error || "Error");
          await loadAndRender();
        });
      });

      el.querySelectorAll("button[data-re]").forEach(btn => {
        btn.addEventListener("click", () => {
          document.getElementById("re_id").value = btn.getAttribute("data-re");
          document.getElementById("re_fecha").value = "";
          document.getElementById("re_notas").value = "";
          new bootstrap.Modal(document.getElementById("modalRe")).show();
        });
      });
    }

    document.getElementById("formAdd").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const nickname = document.getElementById("nickname").value.trim();
      const inseminacion = document.getElementById("inseminacion").value;
      const notas = document.getElementById("notas").value.trim();

      setStatus("Guardando...");
      const resp = await apiAdd({ nickname, inseminacion, notas });
      if (!resp.ok) return alert(resp.error || "Error");

      ev.target.reset();
      bootstrap.Collapse.getOrCreateInstance(document.getElementById("panelAdd")).hide();
      await loadAndRender();
    });

    document.getElementById("formRe").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const id = document.getElementById("re_id").value;
      const fecha = document.getElementById("re_fecha").value;
      const notas = document.getElementById("re_notas").value.trim();

      setStatus("Guardando...");
      const resp = await apiReinseminar(id, fecha, notas);
      if (!resp.ok) return alert(resp.error || "Error");

      bootstrap.Modal.getInstance(document.getElementById("modalRe")).hide();
      await loadAndRender();
    });

    document.getElementById("btnRefresh").addEventListener("click", () => loadAndRender().catch(e => alert(e.message)));
    document.getElementById("showHistorial").addEventListener("change", () => loadAndRender().catch(e => alert(e.message)));

    loadAndRender().catch(e => { alert(e.message); setStatus("Error"); });
  </script>
</body>
</html>
